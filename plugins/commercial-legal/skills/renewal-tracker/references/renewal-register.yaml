# 갱신 등록부 (TEMPLATE/예시)
#
# 이 파일은 템플릿/예시일 뿐이다. 라이브 등록부는 config 경로에 있다:
#   ~/.claude/plugins/config/claude-for-legal-kr/commercial-legal/renewal-register.yaml
#   (config 디렉토리 — 플러그인 업데이트에도 살아남음)
#
# saas-msa-review·vendor-agreement-review 핸드오프와 renewal-tracker Mode 3(CLM 연결 시 스캔),
# 그리고 수동 입력(Mode 1)으로 채워진다. 각 레코드는 계약이 언제 갱신되고 언제까지 해지통보를
# 보내야 하는지를 추적한다.
#
# renewal-watcher 에이전트가 주 1회 이 등록부를 읽어 다가오는 것을 알림 목적지에 게시한다.
#
# 키는 machine-stable 영문 — 바꾸지 않는다. 값·코멘트는 한국어.

renewals: []

# --- 예시 레코드 (실제 데이터가 생기면 삭제) ---
#
# renewals:
#   - counterparty: "에이콘 SaaS"                # 상대방
#     agreement_type: "에이콘 플랫폼 구독계약"     # 계약 유형/명칭
#     signed_date: 2025-06-15                    # 서명일
#     initial_term_end: 2026-06-15               # 최초 계약기간 종료일 (기록용 — 1년 차 이후엔 stale)
#     current_term_end: 2026-06-15               # 현 계약기간 종료일 — 자동갱신마다 앞으로 굴러감; cancel_by_* 계산 기준
#     auto_renew: true                           # 자동갱신 여부 (true면 해지통보 없으면 갱신)
#     renewal_mechanism: "연 단위 자동갱신"        # 갱신 메커니즘
#     notice_period_days: 60                     # 해지통보 기한 — 계약상 며칠 전까지 통보해야 하나
#     notice_method: "이메일"                     # 통보 방법: 이메일 / 포털 / 내용증명 / 등기 / 계약 §X
#     transit_buffer_days: 0                     # 전달 버퍼: 전자 0, 국내 내용증명 5, 국제 등기 10 — 또는 계약 명시 시 그대로
#     cancel_by_calendar: 2026-04-16             # current_term_end − notice_period_days (raw 산술)
#     cancel_by_effective: 2026-04-16            # 통보가 유효한 마지막 영업일 (필요 시 직전 영업일로 roll-back)
#     send_by_effective: 2026-04-16              # cancel_by_effective − transit_buffer_days — 실제 통보를 "보내야" 하는 날 (알림 기준)
#     cancel_by_roll_note: ""                    # 둘이 다른 이유. 예: "일요일 2026-11-01에서 roll-back; 계약상 영업일 정의 대조 필요"
#     cancel_by_provenance: "[모델 계산 — 해지통보 조항 대조 검증 필요]"   # 계산된 기한엔 항상 검증 플래그 동반
#     price_on_renewal: "갱신 시점 정가 (무제한)"  # 갱신 시 가격 메커니즘 — "무제한"이면 협상 leverage 플래그
